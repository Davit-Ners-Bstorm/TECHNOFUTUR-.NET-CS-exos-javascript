<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <title>Exercices JS</title>
</head>
<body>
    <h1>Exercices JavaScript</h1>
    <br>

    <h2>Ex 1 : </h2>
    <br>
    <label for="nom">Nom</label>
    <input type="text" id="nom">

    <label for="age">Age</label>
    <input type="text" id="age">
    <button id="btn1">Generer phrase</button>
    <br>
    <p id="res1"></p>

    <br>
    <hr>
    <br>
    
    <h2>Exercice 1 : Calculateur d'IMC</h2>
    <br>
    <label for="taille">Taille</label>
    <input type="number" id="taille"><br>

    <label for="poids">Poids</label>
    <input type="number" id="poids"><br><br>

    <button id="imcBtn">Calculer l'IMC</button>

    <p id="resultat"></p>
    <p id="status"></p>

    <br>
    <hr>
    <br>

    <h2>Exercice 2 : Calculateur d'âge</h2>

    <label for="dob">Date de naissance</label>
    <input type="date" id="dob">
    <button id="ageBtn">Calculate age</button>
    <p id="dateResult"></p>

    <br>
    <hr>
    <br>

    <h2>Contrôle d'accès — Salle serveur</h2>

    
    <label for="niveau">Niveau d'habilitation (1-5) :</label>
    <input type="number" id="niveau" min="1" max="5" placeholder="ex: 4">
    <br>



    <label for="heure">Heure actuelle (0-23) :</label>
    <input type="number" id="heure" min="0" max="23" placeholder="ex: 14">
    <br>



    <label>Badge actif :</label>
    <input type="checkbox" id="badge">
    <label for="badge">Oui</label>
    <br>
    
    
    <button id="btnVerifier">Vérifier l'accès</button>
    

    <p id="statut"></p>
    <p id="message"></p>

</body>
</html>
